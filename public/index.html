<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Sign Up</title>
</head>

<body style="font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

<div style="background: white; padding: 25px; border-radius: 10px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">

  <!-- LOGIN -->
  <div id="loginForm">
    <h2 style="text-align:center;">Login</h2>

    <input type="email" placeholder="Email"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

    <input type="password" placeholder="Password"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

    <button style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">
      Login
    </button>

    <p style="text-align:center; margin-top:10px;">
      <a href="#" id="showSignup" style="color:#007bff;">Don't have an account? Sign Up</a>
    </p>
  </div>

  <!-- SIGN UP -->
  <div id="signupForm" style="display:none;">
    <h2 style="text-align:center;">Sign Up</h2>

    <input type="text" placeholder="Full Name"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

    <input type="email" placeholder="Email"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

    <input type="password" placeholder="Password"
      style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;">

    <button style="width:100%; padding:10px; background:green; color:white; border:none; border-radius:5px;">
      Sign Up
    </button>

    <p style="text-align:center; margin-top:10px;">
      <a href="#" id="showLogin" style="color:#007bff;">Already have an account? Login</a>
    </p>
  </div>

</div>

<!-- LINK EXTERNAL JS -->
<script src="script.js"></script>

</body>
</html>
