<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<main class="auth-shell">
  <section class="auth-card">
    <p class="eyebrow">Digital Bookshelf</p>

    <div id="loginForm" class="form-panel">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Track what you read, add new titles, and keep your shelf organized in one place.</p>

      <div class="form-field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" class="input" type="email" placeholder="you@example.com">
      </div>

      <div class="form-field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" class="input" type="password" placeholder="Enter your password">
      </div>

      <button class="button button-primary button-full" type="button">Login</button>

      <p class="form-footer">
        <a href="#" id="showSignup">Don't have an account? Sign Up</a>
      </p>

      <a class="ghost-link" href="books.html">Open Bookshelf</a>
    </div>

    <div id="signupForm" class="form-panel" hidden>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Start building your personal reading archive with a clean, simple setup.</p>

      <div class="form-field">
        <label for="fullName">Full Name</label>
        <input id="fullName" class="input" type="text" placeholder="Your full name">
      </div>

      <div class="form-field">
        <label for="signupEmail">Email</label>
        <input id="signupEmail" class="input" type="email" placeholder="you@example.com">
      </div>

      <div class="form-field">
        <label for="signupPassword">Password</label>
        <input id="signupPassword" class="input" type="password" placeholder="Choose a password">
      </div>

      <button class="button button-secondary button-full" type="button">Sign Up</button>

      <p class="form-footer">
        <a href="#" id="showLogin">Already have an account? Login</a>
      </p>
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
